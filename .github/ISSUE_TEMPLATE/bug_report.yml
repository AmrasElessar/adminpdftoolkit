name: 🐛 Bug report
description: Report something that is broken or behaves unexpectedly.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in the form below.
        For **security** issues, please use the private channel in [SECURITY.md](../blob/main/SECURITY.md) instead.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I do X, I expect Y, but Z happens instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps so we can reproduce the issue.
      placeholder: |
        1. Start the server with `python app.py`
        2. Upload sample.pdf
        3. Click "PDF → Excel"
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "v1.0.0 or commit SHA"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 10
        - Windows 11
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (other)
        - Docker
        - Other
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.13.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../blob/main/CODE_OF_CONDUCT.md).
          required: true
