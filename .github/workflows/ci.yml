name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.6"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install mypy
        run: pip install "mypy>=1.10"
      - name: Run mypy
        # Drop the ``|| true`` swallow — type errors now fail the build.
        # Strict-mode is intentionally NOT enabled yet (the codebase has
        # too many gradually-typed call sites for a clean first run);
        # this gate catches actual mypy errors against the default config.
        run: mypy --install-types --non-interactive app.py app_http.py core state.py settings.py pdf_converter.py pdf_safety.py routers pipelines parsers

  packaging:
    name: Packaging drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Verify Dockerfile / portable build cover every source module
        # Adding a new top-level .py or package and forgetting to wire it
        # into the build artifacts has shipped broken images twice — this
        # script fails the build the moment a reference goes missing.
        run: python scripts/check_packaging.py

  test:
    name: Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install system deps (Linux)
        # pycairo is pulled in transitively (xhtml2pdf → svglib → rlpycairo)
        # and ships sdist-only on Linux — needs libcairo2-dev + pkg-config
        # at build time. Wheels exist for Windows/macOS so this is Linux-only.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcairo2-dev pkg-config
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run pytest with coverage
        # Coverage threshold pinned conservatively below the current
        # number so flaky/skipped tests don't immediately red-light CI;
        # raise it when the worker / pdf_tools paths get more coverage.
        run: pytest --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=62
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint, test, packaging]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: admin-pdf-toolkit:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
