services:
  pdfconverter:
    build:
      context: .
      dockerfile: Dockerfile
    image: admin-pdf-toolkit:latest
    container_name: admin-pdf-toolkit
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      MAX_UPLOAD_MB: "2048"
      # HTTPS: "1"     # uncomment to enable self-signed HTTPS
    volumes:
      - pdf_work:/app/_work
      - pdf_output:/app/output
      - pdf_history:/app/history
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pdf_work:
  pdf_output:
  pdf_history:
